name: Test of package installation & execution
'on':
  push:
    branches-ignore:
     - gh-pages
    tags:
     - '*'
  schedule:
  - cron: 0 10 * * 1
jobs:
  build_pip:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-install: [pip]
      fail-fast: false
    steps:
      - name: Check out repository code
        uses: actions/checkout@v2
        with:
          submodules: true
      - name: Patch gtest
        run: |
          cd thirdparty/gtest
          git apply ../gtest.patch
          cd ../..
      - name: Install dependencies on Ubuntu
        if: matrix.os == 'ubuntu-latest'
        run: |
          # sudo apt-get install -y valgrind
          sudo apt-get install -y libc6-dbg gdb valgrind
      - name: Setup Python
        uses: actions/setup-python@v2
      - name: Fix Python path on mac
        if: matrix.os == 'macos-latest'
        run: |
          tee -a ~/.profile <<<'export PATH="${pythonLocation}/bin:${PATH}"'
      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt
      - name: Check for numpy
        run: |
          python -c "import sys; print(sys.executable)"
          python -c "import numpy; print(numpy.get_include())"
      - name: Configure
        run: |
          mkdir build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Debug -DRAPIDJSON_ENABLE_COVERAGE=ON
      - name: Build
        run: |
          cd build
          cmake --build . --config Debug
      - name: Test
        run: |
          cd build
          ctest -C Debug --output-on-failure --verbose
      # - name: Collect coverage
      #   run: |
      #     cd build
      #     cmake .. -DCMAKE_BUILD_TYPE=Debug -DRAPIDJSON_ENABLE_COVERAGE=ON
      #     ctest -T Coverage
      # - name: Upload coverage report
      #   uses: codecov/codecov-action@v1
      #   with:
      #     name: ${{ matrix.os }}-${{ matrix.python-install }}
      #     token: ${{ secrets.CODECOV_TOKEN }}
      #     directory: build/Testing/CoverageInfo
      #     functionalities: gcov
  build_conda:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-install: [conda]
      fail-fast: false
    defaults:
      run:
        shell: bash -l {0}
    steps:
      - name: Check out repository code
        uses: actions/checkout@v2
        with:
          submodules: true
      - name: Patch gtest
        run: |
          cd thirdparty/gtest
          git apply ../gtest.patch
          cd ../..
      - name: Set up MSVC Compiler on windows
        uses: ilammy/msvc-dev-cmd@v1
        if: matrix.os == 'windows-latest'
        with:
          toolset: 14.0
      - name: Set up miniconda test environment
        uses: conda-incubator/setup-miniconda@v2
        with:
          activate-environment: rapidjson
          environment-file: environment.yml
          auto-update-conda: true
          channels: conda-forge
          channel-priority: strict
      - name: Check for numpy
        run: |
          python -c "import sys; print(sys.executable)"
          python -c "import numpy; print(numpy.get_include())"
      - name: Configure
        run: |
          mkdir build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Debug -DRAPIDJSON_ENABLE_COVERAGE=ON
      - name: Build
        run: |
          cd build
          cmake --build . --config Debug
      - name: Test
        run: |
          cd build
          ctest -C Debug --output-on-failure --verbose
      - name: Collect coverage
        run: |
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Debug -DRAPIDJSON_ENABLE_COVERAGE=ON
          ctest -T Coverage
      # - name: Collect coverage with Gcovr (Ubuntu)
      #   if: matrix.os == 'ubuntu-latest'
      #   run: |
      #     gcovr build --exclude-lines-by-pattern="RAPIDJSON_ASSERT\(.*" --html --html-details -o coverage.html
      # - name: Collect coverage with Gcovr (MacOS)
      #   if: matrix.os == 'macos-latest'
      #   run: |
      #     gcovr build --gcov-executable="llvm-cov gcov" --exclude-lines-by-pattern="RAPIDJSON_ASSERT\(.*" --html --html-details -o coverage.html
      - name: Upload coverage report
        uses: codecov/codecov-action@v1
        with:
          name: ${{ matrix.os }}-${{ matrix.python-install }}
          token: ${{ secrets.CODECOV_TOKEN }}
          file: build/coverage/coverage.info
          # directory: build/Testing/CoverageInfo
          functionalities: gcov