name: Test of package installation & execution
'on':
  push:
    branches-ignore:
     - gh-pages
    tags:
     - '*'
  schedule:
  - cron: 0 10 * * 1
jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
      fail-fast: false
    defaults:
      run:
        shell: bash -l {0}
    steps:
      - name: Check out repository code
        uses: actions/checkout@v2
        with:
          submodules: true
      - name: Patch gtest
        run: |
          cd thirdparty/gtest
          git apply ../gtest.patch
          cd ../..
      - name: Set up miniconda test environment
        uses: conda-incubator/setup-miniconda@v2
        with:
          activate-environment: rapidjson
          environment-file: environment.yml
          auto-update-conda: true
          channels: conda-forge
          channel-priority: strict
      # - name: Setup Python
      #   uses: actions/setup-python@v2
      # - name: Install Python dependencies
      #   run: pip install -r requirements.txt
      - name: Configure
        run: |
          cmake -S. -Bbuild -DCMAKE_BUILD_TYPE=Debug -DRAPIDJSON_ENABLE_COVERAGE=ON
      - name: Build
        run: |
          cmake --build build --config Debug
      - name: Test
        run: |
          cd build
          ctest -C Debug --output-on-failure --verbose
      - name: Collect coverage
        run: |
          cd build
          ctest -T Coverage
      - name: Upload coverage report
        uses: codecov/codecov-action@v1
        with:
          name: ${{ matrix.os }}
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: build/Testing/CoverageInfo