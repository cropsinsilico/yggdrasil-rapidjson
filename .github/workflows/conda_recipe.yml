name: Test of conda recipe build
'on':
  push:
    branches-ignore:
     - gh-pages
    tags:
     - '*'
  schedule:
  - cron: 0 10 * * 1
jobs:
  build_conda_recipe:
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash -el {0}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11"]
        builder: [conda]
        target-platform: [none]
        include:
          - os: ubuntu-latest
            target-platform: linux-64
            python-version: "3.11"
            builder: rattler
          - os: macos-latest
            target-platform: osx-arm64
            python-version: "3.11"
            builder: rattler
          - os: windows-latest
            target-platform: win-64
            python-version: "3.11"
            builder: rattler
      fail-fast: false
    steps:
      - name: Check out repository code
        uses: actions/checkout@v5
        with:
          submodules: true

      ###################################
      # CONDA SETUP
      ###################################
      - name: Set up MSVC Compiler on windows
        uses: ilammy/msvc-dev-cmd@v1
        if: matrix.os == 'windows-latest'
      - name: Set up miniconda test environment
        uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: ""
          auto-activate-base: true
          auto-update-conda: true
          channels: conda-forge
          channel-priority: strict
          miniforge-version: latest
          conda-remove-defaults: true
      - name: Install conda-build
        if: matrix.builder == 'conda'
        run: |
          conda info
          conda list
          conda install conda-build cmake numpy -y
      - name: Check conda installation & create test environment
        run: |
          conda info
          conda list
          conda create -n test python=${{ matrix.python-version }} cmake cxx-compiler
          mkdir -p $HOME/local_channel
      - name: Build conda recipe (using conda-build)
        if: matrix.builder == 'conda'
        run: |
          conda-build --no-anaconda-upload --output-folder $HOME/local_channel/ --python ${{ matrix.python-version }} recipe/
      - name: Build conda recipe (using rattler-build action)
        uses: prefix-dev/rattler-build-action@v0.2.34
        if: matrix.builder == 'rattler'
        with:
          upload-artifact: false
          build-args: --output-dir $HOME/local_channel/ --target-platform ${{ matrix.target-platform }}
      - name: Install from local conda recipe
        run: |
          conda install -n test -c $HOME/local_channel yggdrasil-rapidjson
          conda list -n test

      ###################################
      # Test
      ###################################
      # TODO: Update to yggdrasil version
      - name: Build & run serialize test example using conda installation
        run: |
          mkdir example/serialize/build
          cd example/serialize/build
          conda run -n test cmake .. -DCMAKE_VERBOSE_MAKEFILE:BOOL=ON
          conda run -n test cmake --build . --config Debug
          conda run -n test ./serialize
      - name: Build & run yggdrasil test example using conda installation
        run: |
          mkdir example/yggdrasil/build
          cd example/yggdrasil/build
          conda run -n test cmake .. -DCMAKE_VERBOSE_MAKEFILE:BOOL=ON
          conda run -n test cmake --build . --config Debug
          conda run -n test ./yggdrasil
      - name: Build & run schemanormalizer test example using conda installation
        run: |
          mkdir example/units/build
          cd example/units/build
          conda run -n test cmake .. -DCMAKE_VERBOSE_MAKEFILE:BOOL=ON
          conda run -n test cmake --build . --config Debug
          conda run -n test ./units
